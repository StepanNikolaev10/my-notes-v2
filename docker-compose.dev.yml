services:
  server:
    container_name: nest-hot-reload-app
    image: node:20-alpine
    working_dir: /usr/src/app
    ports:
      - ${PORT}:${PORT}
    volumes:
      - .:/usr/src/app
      - server_node_modules:/usr/src/app/apps/server/node_modules
      - root_node_modules:/usr/src/app/node_modules
    env_file:
      - path: .env.development
        required: true # не обязательный, ошибки не будет если он отсутсвует, ...
        # ... но если он есть он переопределит одномённые переменные с .env.example либо добавит новые.
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB_NAME}
    command: sh -c "npm install && npm run start:dev -w @my-notes/server" # используется sh -c потому что Exec form ["npm", "install"] не поддерживает запуск нескольких команд одновременно
    # sh это оболочка (shell) для управления Linux-системой, это как минимальный набор инструментов, который позволяет отдавать приказы системе внутри контейнера, используя логику (типа &&).
  postgres:
    image: postgres:18-alpine
    container_name: postgres-db
    restart: always
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:8.6-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: >
      redis-server 
      --appendonly yes 
      --auto-aof-rewrite-percentage 100 
      --auto-aof-rewrite-min-size 64mb 
      --save 900 1
    
    # ПОЯСНЕНИЯ ПАРАМЕТРОВ:
    # 1. --appendonly yes 
    #    Включает AOF (журнал транзакций). Каждое изменение записывается в лог. 
    #    Гарантирует, что сессии не пропадут при перезагрузке Docker.
    #
    # 2. --auto-aof-rewrite-percentage 100 
    #    Условие чистки: запустить сжатие журнала, когда его размер 
    #    вырастет на 100% (в 2 раза) относительно последнего чистого состояния.
    #
    # 3. --auto-aof-rewrite-min-size 64mb 
    #    Порог чистки: не запускать сжатие, пока файл лога меньше 64 МБ. 
    #    Защищает от слишком частой перезаписи мелких файлов.
    #
    # 4. --save 900 1 
    #    Включает RDB (снимки). Делает слепок всей базы раз в 15 минут (900 сек), 
    #    если был изменен хотя бы 1 ключ. Удобно для создания бэкапов.
    volumes:
      - redis_data:/data
volumes:
  root_node_modules:
  server_node_modules:
  postgres_data:
  redis_data:
